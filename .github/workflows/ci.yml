name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint_ruby:
    name: Lint Ruby (RuboCop)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - run: bundle exec rubocop --parallel --format github

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Spring is in the :development, :test group and would otherwise try to
      # preload the app, which fails on the test env's default cache_classes=true.
      DISABLE_SPRING: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up database
        env:
          RAILS_ENV: test
        run: bin/rails db:schema:load

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Run tests
        env:
          RAILS_ENV: test
        run: bin/rails test

      - name: Run system tests
        env:
          BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          RAILS_ENV: test
        run: bin/rails test:system
