name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint_ruby:
    name: Lint Ruby (RuboCop)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true

      - run: bundle exec rubocop --parallel --format github

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Spring is in the :development, :test group and would otherwise try to
      # preload the app, which fails on the test env's default cache_classes=true.
      DISABLE_SPRING: "1"
      REDIS_URL: redis://localhost:6379/0
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JavaScript dependencies
        run: |
          npm install --global yarn
          yarn install --frozen-lockfile

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Set up database
        env:
          RAILS_ENV: test
        run: bin/rails db:schema:load

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Run tests
        env:
          RAILS_ENV: test
        run: bin/rails test

      - name: Run system tests
        env:
          BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          RAILS_ENV: test
        run: bin/rails test:system

  i18n_check:
    name: Check i18n
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true

      - run: bin/i18n-tasks health
