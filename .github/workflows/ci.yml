name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUNDLE_PATH: vendor/bundle
      # Spring is in the :development, :test group and would otherwise try to
      # preload the app, which fails on the test env's default cache_classes=true.
      DISABLE_SPRING: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: spinel-coop/setup-rv@main
        with:
          ruby-version: 'current'

      - name: Install gems
        run: rv clean-install --force

      - name: Set up database
        env:
          RAILS_ENV: test
        run: |
          bin/rails db:schema:load

      - name: Run tests
        env:
          RAILS_ENV: test
        run: |
          bin/rails test
